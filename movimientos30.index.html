<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art-Odyssey: Movimientos Culturales y Artísticos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --primary: #fbbf24;
            --bg-dark: #0f172a;
            --tv-blue: #1e3a8a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            scroll-behavior: smooth;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .tv-border {
            border: 4px solid var(--primary);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .movement-badge {
            background: linear-gradient(135deg, #fbbf24 0%, #b45309 100%);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .option-btn {
            background: linear-gradient(90deg, #1e3a8a 0%, #1e40af 100%);
            border: 2px solid #3b82f6;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background: #3b82f6;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .option-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .incorrect { background: #dc2626 !important; border-color: #ef4444 !important; }
        
        .artwork-item {
            background: rgba(255,255,255,0.05);
            border-left: 3px solid var(--primary);
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navegación Estilo TV -->
    <nav class="sticky top-0 z-50 bg-blue-900/90 backdrop-blur-md border-b-4 border-amber-500 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-3xl font-serif italic text-amber-400 drop-shadow-lg">ART-ODYSSEY TV</h1>
            <div class="flex items-center gap-6">
                <div id="lives-container" class="flex gap-2 text-2xl">
                    <span>❤️</span><span>❤️</span><span>❤️</span>
                </div>
                <div id="xp-counter" class="bg-amber-500 text-blue-950 px-4 py-1 rounded-full font-bold shadow-lg">
                    0 Puntos
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <!-- VISTA: EXPLORACIÓN -->
        <section id="explore-view" class="space-y-12">
            <header class="text-center py-10">
                <h2 class="text-4xl md:text-6xl font-serif mb-4 uppercase text-white drop-shadow-md">Movimientos Culturales y Artísticos</h2>
                <p class="text-blue-200 max-w-2xl mx-auto text-lg">Estudia las fichas y revisa las obras principales antes del concurso.</p>
                <div class="mt-8 flex justify-center gap-4">
                     <button onclick="changeView('quiz')" class="bg-amber-500 hover:bg-amber-400 text-blue-950 px-8 py-3 rounded-full font-black text-xl shadow-xl transition-all hover:-translate-y-1">¡IR AL CONCURSO!</button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="movements-grid"></div>
        </section>

        <!-- VISTA: QUIZ -->
        <section id="quiz-view" class="hidden max-w-4xl mx-auto py-12">
            <div class="glass-card tv-border p-8 rounded-3xl text-center relative overflow-hidden">
                <div id="quiz-intro">
                    <h2 class="text-5xl font-serif mb-6 text-amber-400">Gran Batería de Preguntas</h2>
                    <p class="text-xl mb-8 text-blue-100 italic">"50 preguntas posibles, 10 por partida. ¡Nunca es igual!"</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div class="bg-blue-900/50 p-4 rounded-xl border border-blue-400/30">
                            <span class="block text-3xl">🔄</span>
                            <span class="font-bold">Aleatorio</span>
                        </div>
                        <div class="bg-blue-900/50 p-4 rounded-xl border border-blue-400/30">
                            <span class="block text-3xl">❤️</span>
                            <span class="font-bold">3 Vidas</span>
                        </div>
                        <div class="bg-blue-900/50 p-4 rounded-xl border border-blue-400/30">
                            <span class="block text-3xl">🏆</span>
                            <span class="font-bold">200 XP/acierto</span>
                        </div>
                    </div>
                    <button onclick="startQuiz()" class="bg-amber-500 hover:bg-amber-400 text-blue-950 px-12 py-4 rounded-full font-black text-2xl shadow-2xl transition-all transform hover:scale-110 uppercase">
                        ¡QUE EMPIECE EL SHOW!
                    </button>
                </div>

                <div id="quiz-container" class="hidden text-center relative z-10">
                    <div class="flex justify-between items-center mb-8">
                        <span id="question-count" class="bg-blue-800 px-4 py-1 rounded text-sm font-bold border border-blue-400 text-blue-200 uppercase tracking-widest">Pregunta 1/10</span>
                        <div class="flex gap-2">
                            <button id="joker-50" onclick="useJoker50()" class="bg-purple-600 hover:bg-purple-500 px-3 py-1 rounded-lg text-xs font-bold border-b-4 border-purple-800 active:border-b-0">50:50</button>
                        </div>
                    </div>

                    <div class="bg-blue-950/80 p-6 rounded-2xl mb-8 border-x-4 border-amber-500">
                        <h3 id="question-text" class="text-2xl md:text-3xl font-bold leading-tight"></h3>
                    </div>

                    <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    <div id="feedback-msg" class="mt-8 text-2xl font-black uppercase tracking-tighter hidden animate-pop"></div>
                </div>

                <div id="quiz-result" class="hidden">
                    <h2 class="text-6xl font-serif mb-4 text-amber-400" id="result-title"></h2>
                    <p class="text-2xl mb-8" id="result-text"></p>
                    <button onclick="changeView('explore')" class="bg-white/10 hover:bg-white/20 border border-white/20 px-8 py-3 rounded-full mr-4">REPASAR</button>
                    <button onclick="startQuiz()" class="bg-amber-500 text-blue-950 px-8 py-3 rounded-full font-bold">REINTENTAR</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="info-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border-t-4 border-amber-500 max-w-4xl w-full max-h-[90vh] overflow-y-auto rounded-b-3xl p-8 relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white text-3xl font-bold">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const movements = [
            { id: 'eaa', title: 'Expresionismo Abstracto Americano', context: 'Años 40-50, Nueva York.', desc: 'Centrado en el gesto y la emoción monumental.', keys: ['Gesto', 'Automatismo', 'Gran formato'], artists: 'Jackson Pollock, Mark Rothko, Willem de Kooning.', works: ['Pollock: Autumn Rhythm', 'Rothko: No. 61', 'De Kooning: Woman I'] },
            { id: 'pop', title: 'Pop Art y Neopop', context: 'Años 50-60. Consumismo masivo.', desc: 'Iconos populares con técnicas industriales.', keys: ['Masa', 'Ironía', 'Repetición'], artists: 'Andy Warhol, Roy Lichtenstein, Jeff Koons.', works: ['Warhol: Marilyn Diptych', 'Lichtenstein: Whaam!', 'Koons: Balloon Dog'] },
            { id: 'inf', title: 'Informalismo Europeo', context: 'Años 40-50. Europa posguerra.', desc: 'Énfasis en la materia y textura (arenas, trapos).', keys: ['Materia', 'Textura', 'Azar'], artists: 'Antoni Tàpies, Alberto Burri, Jean Dubuffet.', works: ['Tàpies: Gran pintura gris', 'Burri: Sacco e Rosso', 'Dubuffet: Dhotel nuancé'] },
            { id: 'hip', title: 'Hiperrealismo', context: 'Finales años 60.', desc: 'Reproducción fotográfica minuciosa.', keys: ['Precisión', 'Fotografía', 'Nitidez'], artists: 'Antonio López, Richard Estes, Chuck Close.', works: ['Antonio López: Gran Vía', 'Estes: Telephone Booths', 'Close: Big Self-Portrait'] },
            { id: 'min', title: 'Minimalismo', context: 'Años 60, EEUU.', desc: 'Reducción a formas geométricas puras.', keys: ['Geometría', 'Serie', 'Silencio'], artists: 'Donald Judd, Carl Andre, Dan Flavin.', works: ['Judd: Untitled (Stacks)', 'Andre: Equivalent VIII', 'Flavin: Monument for V. Tatlin'] },
            { id: 'con', title: 'Arte Conceptual', context: 'Años 60-70.', desc: 'La idea prevalece sobre el objeto físico.', keys: ['Idea', 'Documento', 'Lenguaje'], artists: 'Joseph Kosuth, Sol LeWitt, Jenny Holzer.', works: ['Kosuth: One and Three Chairs', 'LeWitt: Wall Drawings', 'Holzer: Truisms'] },
            { id: 'fem', title: 'Arte Feminista', context: 'Años 70.', desc: 'Reivindicación de la mujer y el cuerpo.', keys: ['Identidad', 'Cuerpo', 'Política'], artists: 'Judy Chicago, Cindy Sherman, Barbara Kruger.', works: ['Chicago: The Dinner Party', 'Sherman: Untitled Film Stills', 'Kruger: I shop therefore I am'] },
            { id: 'acc', title: 'Arte de Acción', context: 'Años 60+.', desc: 'Performance, Happening y Body Art.', keys: ['Cuerpo', 'Efímero', 'Experiencia'], artists: 'Marina Abramovic, Joseph Beuys, Allan Kaprow.', works: ['Abramovic: Rhythm 0', 'Beuys: I Like America', 'Kaprow: Yard'] }
        ];

        // BATERÍA DE 50 PREGUNTAS
        const masterQuestions = [
            // EAA
            { q: "¿En qué década surge el Expresionismo Abstracto Americano?", o: ["Años 20", "Años 40-50", "Años 60", "Años 80"], a: 1 },
            { q: "¿Qué artista es famoso por su técnica de 'dripping'?", o: ["Rothko", "De Kooning", "Pollock", "Judd"], a: 2 },
            { q: "La obra 'No. 61 (Rust and Blue)' pertenece a:", o: ["Jackson Pollock", "Mark Rothko", "Andy Warhol", "Antoni Tàpies"], a: 1 },
            { q: "¿Qué ciudad se convirtió en el centro del arte mundial tras la 2ª Guerra Mundial?", o: ["París", "Londres", "Nueva York", "Berlín"], a: 2 },
            { q: "El 'Action Painting' se caracteriza por:", o: ["Precisión técnica", "El gesto y movimiento", "Uso de plantillas", "Figuras geométricas"], a: 1 },
            { q: "Willem de Kooning es conocido por su serie de:", o: ["Cajas", "Mujeres", "Coches", "Sillas"], a: 1 },
            
            // POP ART
            { q: "¿Qué movimiento utiliza iconos de la publicidad y el cine?", o: ["Minimalismo", "Pop Art", "Informalismo", "Conceptual"], a: 1 },
            { q: "¿Quién pintó el díptico de Marilyn Monroe?", o: ["Jeff Koons", "Andy Warhol", "Richard Estes", "Roy Lichtenstein"], a: 1 },
            { q: "Roy Lichtenstein se inspiraba visualmente en:", o: ["La naturaleza", "El cómic", "La escultura griega", "La fotografía de prensa"], a: 1 },
            { q: "Jeff Koons es un representante del:", o: ["Pop Art clásico", "Neopop", "Hiperrealismo", "Informalismo"], a: 1 },
            { q: "¿Qué obra es famosa por representar un perro de globo gigante?", o: ["Balloon Dog", "Whaam!", "Marilyn", "Equivalent VIII"], a: 0 },
            { q: "El Pop Art surge como reacción a:", o: ["El Hiperrealismo", "La elitismo del Expresionismo Abstracto", "El Arte de Acción", "La escultura clásica"], a: 1 },

            // INFORMALISMO
            { q: "¿Qué material es clave en las obras de Antoni Tàpies?", o: ["Plástico", "Materia (arena, cuerdas, polvo)", "Neon", "Acero pulido"], a: 1 },
            { q: "El Informalismo Europeo se desarrolla principalmente en:", o: ["Postguerra", "Entreguerras", "Renacimiento", "Siglo XXI"], a: 0 },
            { q: "Alberto Burri utilizaba a menudo sacos de:", o: ["Seda", "Arpillera", "Plástico", "Algodón"], a: 1 },
            { q: "El término 'Art Brut' está asociado a:", o: ["Jean Dubuffet", "Donald Judd", "Sol LeWitt", "Chuck Close"], a: 0 },
            { q: "¿Cuál de estos conceptos define al Informalismo?", o: ["Nitidez", "Materia y azar", "Geometría pura", "Orden industrial"], a: 1 },
            
            // HIPERREALISMO
            { q: "¿Qué utiliza el hiperrealista como base para su obra?", o: ["La imaginación", "La fotografía", "El sueño", "La geometría"], a: 1 },
            { q: "Antonio López es famoso por sus vistas de:", o: ["París", "Madrid", "Barcelona", "Nueva York"], a: 1 },
            { q: "¿Quién realizó el 'Big Self-Portrait' de gran formato?", o: ["Richard Estes", "Chuck Close", "Marina Abramovic", "Jeff Koons"], a: 1 },
            { q: "Richard Estes es conocido por sus pinturas de:", o: ["Escenas de guerra", "Reflejos en escaparates", "Retratos psicológicos", "Abstracciones"], a: 1 },
            { q: "El Hiperrealismo busca la:", o: ["Máxima subjetividad", "Objetividad extrema", "Gestualidad libre", "Idea pura"], a: 1 },

            // MINIMALISMO
            { q: "¿Qué frase resume el espíritu Minimalista?", o: ["Más es más", "Menos es más", "El arte es idea", "El gesto es todo"], a: 1 },
            { q: "Donald Judd utilizaba materiales de tipo:", o: ["Orgánico", "Industrial", "Desechos", "Textiles"], a: 1 },
            { q: "¿Quién colocaba placas de metal en el suelo para que la gente caminara sobre ellas?", o: ["Carl Andre", "Dan Flavin", "Sol LeWitt", "Antoni Tàpies"], a: 0 },
            { q: "Las obras de Dan Flavin consisten en:", o: ["Cajas de madera", "Tubos fluorescentes de luz", "Pintura sobre arena", "Esculturas de mármol"], a: 1 },
            { q: "El Minimalismo se caracteriza por formas:", o: ["Barrocas", "Geométricas y seriadas", "Figurativas", "Orgánicas"], a: 1 },

            // CONCEPTUAL
            { q: "¿Qué prevalece en el Arte Conceptual?", o: ["La técnica", "La idea", "El color", "El precio"], a: 1 },
            { q: "Joseph Kosuth presentó una silla real, una foto y una definición en:", o: ["Wall Drawings", "One and Three Chairs", "Truisms", "Rhythm 0"], a: 1 },
            { q: "¿Quién creó los 'Wall Drawings' mediante instrucciones?", o: ["Andy Warhol", "Sol LeWitt", "Antonio López", "Mark Rothko"], a: 1 },
            { q: "Jenny Holzer es famosa por sus frases llamadas:", o: ["Eslóganes", "Truisms (Truismos)", "Poemas", "Gritos"], a: 1 },
            { q: "El arte conceptual cuestiona:", o: ["Solo el color", "El objeto artístico tradicional", "La luz natural", "El uso del pincel"], a: 1 },

            // FEMINISTA
            { q: "Judy Chicago creó una gran instalación de mesa llamada:", o: ["The Party", "The Dinner Party", "The Last Supper", "Women Table"], a: 1 },
            { q: "Cindy Sherman utiliza su propio cuerpo para:", o: ["Bailar", "Untitled Film Stills (fotografías)", "Pintar cuadros", "Hacer gimnasia"], a: 1 },
            { q: "Barbara Kruger utiliza tipografía y fotos con estilo:", o: ["Barroco", "Publicitario y crítico", "Minimalista", "Impresionista"], a: 1 },
            { q: "¿Qué reclama el Arte Feminista?", o: ["Menos museos", "El lugar de la mujer en la historia del arte", "Pintar solo flores", "El fin de la fotografía"], a: 1 },
            { q: "El Arte Feminista de los 70 cuestiona:", o: ["El canon masculino", "La pintura al óleo", "El uso de marcos", "La arquitectura"], a: 0 },

            // ACCIÓN
            { q: "Marina Abramovic es una figura clave del:", o: ["Minimalismo", "Arte de Acción / Performance", "Pop Art", "Hiperrealismo"], a: 1 },
            { q: "¿Qué artista convivió con un coyote en una galería?", o: ["Allan Kaprow", "Joseph Beuys", "Jeff Koons", "Donald Judd"], a: 1 },
            { q: "Los 'Happenings' fueron iniciados por:", o: ["Jackson Pollock", "Allan Kaprow", "Cindy Sherman", "Carl Andre"], a: 1 },
            { q: "En el Body Art, el soporte de la obra es:", o: ["El lienzo", "El cuerpo del artista", "La pared", "La pantalla"], a: 1 },
            { q: "La obra 'Rhythm 0' de Abramovic exploraba:", o: ["La pintura rápida", "La relación artista-público", "El color azul", "La luz eléctrica"], a: 1 },

            // MIXTAS / REPASO
            { q: "¿Qué movimiento es más 'frío' y 'distante'?", o: ["Informalismo", "Minimalismo", "Expresionismo", "Acción"], a: 1 },
            { q: "¿Qué movimiento es heredero directo de los Readymades de Duchamp?", o: ["Hiperrealismo", "Arte Conceptual", "Informalismo", "Pop Art"], a: 1 },
            { q: "Si ves un cuadro que parece una fotografía perfecta, es:", o: ["Pop Art", "Hiperrealismo", "Informalismo", "Conceptual"], a: 1 },
            { q: "Si el artista tira pintura al suelo con botes agujereados, es:", o: ["Action Painting", "Minimalismo", "Hiperrealismo", "Pop Art"], a: 0 },
            { q: "¿Qué tienen en común Pollock y Tàpies?", o: ["Uso de la fotografía", "Importancia de la ejecución gestual/material", "Pintura geométrica", "Temática de cómics"], a: 1 },
            { q: "¿Quién de estos NO es minimalista?", o: ["Donald Judd", "Carl Andre", "Andy Warhol", "Dan Flavin"], a: 2 },
            { q: "¿Qué movimiento utiliza la 'serigrafía' para repetir imágenes?", o: ["Pop Art", "Hiperrealismo", "Conceptual", "Minimalismo"], a: 0 },
            { q: "El 'Land Art' o intervenciones en la naturaleza suelen ser:", o: ["Pop Art", "Efímeras y conceptuales", "Hiperrealistas", "Figurativas"], a: 1 }
        ];

        let currentXP = 0;
        let gameQuestions = [];
        let currentQuestionIdx = 0;
        let lives = 3;
        let score = 0;
        let jokerUsed = false;
        let canAnswer = true;

        // Función para barajar arrays
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderMovements() {
            const grid = document.getElementById('movements-grid');
            grid.innerHTML = movements.map((m, index) => `
                <div class="glass-card p-6 rounded-2xl animate-fade">
                    <div class="movement-badge w-fit px-3 py-1 rounded-md text-[10px] font-bold mb-4 uppercase text-blue-900">FICHA ${index + 1}</div>
                    <h3 class="text-xl font-bold mb-3 text-amber-400 uppercase leading-tight">${m.title}</h3>
                    <p class="text-blue-100/70 text-sm mb-6 line-clamp-2">${m.desc}</p>
                    <button onclick="openMovement('${m.id}')" class="w-full py-2 bg-white/10 border border-white/20 rounded-lg text-white hover:bg-amber-500 hover:text-blue-950 transition-all font-bold text-xs uppercase">
                        REPASAR DETALLES
                    </button>
                </div>
            `).join('');
        }

        function openMovement(id) {
            const m = movements.find(x => x.id === id);
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-4xl font-serif text-amber-400 mb-6 text-center">${m.title}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <div class="bg-blue-900/40 p-4 rounded-xl mb-4">
                            <h4 class="text-amber-500 font-bold uppercase text-xs mb-1">Contexto</h4>
                            <p class="text-sm">${m.context}</p>
                        </div>
                        <h4 class="text-amber-500 font-bold uppercase text-xs mb-3">🖼️ ALGUNAS OBRAS PRINCIPALES</h4>
                        ${m.works.map(w => `<div class="artwork-item">${w}</div>`).join('')}
                    </div>
                    <div class="bg-white/5 p-6 rounded-2xl">
                        <p class="text-sm italic mb-4">"${m.desc}"</p>
                        <h4 class="text-amber-500 font-bold uppercase text-xs mb-1">Protagonistas</h4>
                        <p class="text-white font-bold mb-4">${m.artists}</p>
                        <div class="flex flex-wrap gap-2">
                            ${m.keys.map(k => `<span class="bg-blue-800 px-2 py-1 rounded text-[10px]">#${k.toUpperCase()}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('info-modal').classList.remove('hidden');
        }

        function startQuiz() {
            // 1. Barajamos todas las preguntas
            const shuffledPool = shuffle([...masterQuestions]);
            // 2. Tomamos las primeras 10
            gameQuestions = shuffledPool.slice(0, 10);
            
            currentQuestionIdx = 0;
            score = 0;
            lives = 3;
            jokerUsed = false;
            updateLives();
            
            document.getElementById('quiz-intro').classList.add('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('joker-50').disabled = false;
            document.getElementById('joker-50').classList.remove('opacity-30');
            
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            const qData = gameQuestions[currentQuestionIdx];
            document.getElementById('question-count').innerText = `Pregunta ${currentQuestionIdx + 1}/10`;
            document.getElementById('question-text').innerText = qData.q;
            document.getElementById('feedback-msg').classList.add('hidden');
            
            // Creamos copias de las opciones para barajarlas sin romper la referencia al índice correcto
            const options = qData.o.map((text, index) => ({ text, isCorrect: index === qData.a }));
            shuffle(options);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-xl font-bold text-white shadow-lg";
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.isCorrect, btn);
                grid.appendChild(btn);
            });
        }

        function selectOption(isCorrect, btn) {
            if (!canAnswer) return;
            canAnswer = false;
            const msg = document.getElementById('feedback-msg');
            const buttons = document.querySelectorAll('.option-btn');

            if (isCorrect) {
                score++;
                gainXP(200);
                btn.classList.add('correct');
                msg.innerText = "¡CORRECTO! +200 XP";
                msg.className = "mt-8 text-2xl font-black text-green-400 animate-pop";
            } else {
                lives--;
                updateLives();
                btn.classList.add('incorrect');
                // Mostrar la correcta
                buttons.forEach(b => {
                    // Buscamos la correcta en el set actual
                    if (gameQuestions[currentQuestionIdx].o[gameQuestions[currentQuestionIdx].a] === b.innerText.split(' ').slice(1).join(' ') || 
                        gameQuestions[currentQuestionIdx].o[gameQuestions[currentQuestionIdx].a] === b.innerText) {
                        b.classList.add('correct');
                    }
                });
                msg.innerText = "¡FALLO!";
                msg.className = "mt-8 text-2xl font-black text-red-500 animate-pop";
            }
            msg.classList.remove('hidden');

            setTimeout(() => {
                if (lives <= 0) return finishGame("¡ELIMINADO!");
                currentQuestionIdx++;
                if (currentQuestionIdx < 10) loadQuestion();
                else finishGame("¡VICTORIA!");
            }, 1800);
        }

        function useJoker50() {
            if (jokerUsed) return;
            const buttons = Array.from(document.querySelectorAll('.option-btn'));
            const qData = gameQuestions[currentQuestionIdx];
            const correctText = qData.o[qData.a];
            
            let incorrects = buttons.filter(b => b.innerText !== correctText);
            shuffle(incorrects);
            incorrects.slice(0, 2).forEach(b => b.style.visibility = 'hidden');
            
            jokerUsed = true;
            document.getElementById('joker-50').disabled = true;
            document.getElementById('joker-50').classList.add('opacity-30');
        }

        function finishGame(title) {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            document.getElementById('result-title').innerText = title;
            document.getElementById('result-text').innerText = `Has acertado ${score} de 10 preguntas.`;
        }

        function gainXP(v) { currentXP += v; document.getElementById('xp-counter').innerText = `${currentXP} Puntos`; }
        function updateLives() { document.getElementById('lives-container').innerHTML = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives); }
        function closeModal() { document.getElementById('info-modal').classList.add('hidden'); }
        function changeView(v) { 
            document.getElementById('explore-view').classList.add('hidden'); 
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById(v + '-view').classList.remove('hidden');
        }

        renderMovements();
    </script>
</body>
</html>
